<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Register for a Course</title>
    <link rel="icon" href="emc.png">
    
</head>
<body>
     <center>
    <h1>Error Makes Clever Academy🚀</h1>
    <h5>Training | Tech News | Freshers Guide</h5>
    <p>Empowering young developers to level up their skills through training in software development technologies🧑‍💻</p>
    <hr>
    </center>
    <center>
    <h1>Registration Form</h1>
    <form>
        <table>
            <tr>
                <td>Name:</td> <td><input type="text"></td>
            </tr>
            <tr>
                <td>Age:</td> <td><input type="number"></td>
            </tr>
            <tr>
                <td>Gender:</td> 
                <td>
                    <input type="radio" name="gender" value="Male"> Male 
                    <input type="radio" name="gender" value="Female"> Female
                </td>
            </tr>
            <tr>
                <td>Email:</td> <td><input type="email"></td>
            </tr>
            <tr>
                <td>Select Course:</td>
                <td>
                    <select name="courseName">
                        <option value="fullstack">Full Stack Development</option>
                        <option value="datascience">Data Science</option>
                        <option value="cloudcomputing">Cloud Computing</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Upload your Resume:</td> <td><input type="file"></td>
            </tr>
            <tr>
                <td></td> <td><input type="submit"> <input type="reset"></td>
            </tr>
        </table>
    </form>
    </center>
    <hr>
    <center>
        <p>
            <a href="index.html">Home |</a>
            <a href="https://www.instagram.com"> Instagram |</a>
            <a href="https://www.youtube.com"> Youtube</a>
        </p>
    </center>
    <hr>

</body>
</html>
